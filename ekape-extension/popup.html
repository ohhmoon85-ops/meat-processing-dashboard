<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>EKAPE 원패스 자동화</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 300px; font-family: 'Malgun Gothic', sans-serif; font-size: 13px; background: #f8fafc; color: #1e293b; }
    header { background: linear-gradient(135deg, #1d4ed8, #2563eb); color: #fff; padding: 12px 16px; }
    header h1 { font-size: 14px; font-weight: 700; }
    header p  { font-size: 11px; opacity: .85; margin-top: 2px; }

    /* 작업 상태 패널 */
    .job-panel { margin: 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; }
    .job-header { display: flex; align-items: center; gap: 8px; padding: 10px 12px; background: #f0f9ff; border-bottom: 1px solid #e0f2fe; font-weight: 700; font-size: 13px; }
    .job-header.ok    { background: #f0fdf4; border-color: #bbf7d0; }
    .job-header.err   { background: #fef2f2; border-color: #fecaca; }
    .job-header.idle  { background: #f8fafc; border-color: #e2e8f0; color: #94a3b8; }
    .job-body { padding: 10px 12px; font-size: 12px; }
    .job-progress { font-size: 22px; font-weight: 800; color: #1d4ed8; margin-bottom: 4px; }
    .job-current { color: #475569; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 8px; }
    .cancel-btn { width: 100%; padding: 6px; background: #fee2e2; color: #b91c1c; border: 1px solid #fca5a5; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .cancel-btn:hover { background: #fecaca; }
    .no-job { padding: 12px; text-align: center; color: #94a3b8; font-size: 12px; }

    /* 설정 섹션 */
    .section-title { padding: 8px 12px 4px; font-size: 11px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: .5px; border-top: 1px solid #e2e8f0; }
    .body { padding: 0 12px 8px; }
    .row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
    .row:last-child { border-bottom: none; }
    .lbl { display: flex; flex-direction: column; gap: 2px; }
    .lbl span { font-weight: 600; font-size: 12px; }
    .lbl small { font-size: 10px; color: #64748b; }
    .toggle { position: relative; width: 38px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #cbd5e1; border-radius: 20px; cursor: pointer; transition: background .2s; }
    .slider::before { content: ''; position: absolute; width: 14px; height: 14px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform .2s; }
    .toggle input:checked + .slider { background: #2563eb; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
    .save-btn { width: 100%; margin: 8px 12px 12px; width: calc(100% - 24px); padding: 8px; background: #2563eb; color: #fff; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .save-btn:hover { background: #1d4ed8; }
    .save-btn.saved { background: #059669; }
  </style>
</head>
<body>
  <header>
    <h1>🤖 EKAPE 원패스 자동화</h1>
    <p>통합증명서 발급 신청을 자동으로 처리합니다</p>
  </header>

  <!-- 작업 진행 상태 -->
  <div id="jobPanel" class="job-panel">
    <div id="jobHeader" class="job-header idle">
      <span id="jobIcon">💤</span>
      <span id="jobStatusText">대기 중</span>
    </div>
    <div id="jobBody" class="job-body" style="display:none">
      <div class="job-progress" id="jobProgress">0 / 0</div>
      <div class="job-current" id="jobCurrent"></div>
      <button class="cancel-btn" id="cancelBtn">⏹ 작업 중단</button>
    </div>
    <div id="noJob" class="no-job">대시보드에서 개체를 선택하고<br>"통합증명서 발급 자동화"를 클릭하세요.</div>
  </div>

  <!-- 설정 -->
  <div class="section-title">설정</div>
  <div class="body">
    <div class="row">
      <div class="lbl">
        <span>자동 시작</span>
        <small>로그인 감지 후 자동 실행</small>
      </div>
      <label class="toggle"><input type="checkbox" id="autoStart" /><span class="slider"></span></label>
    </div>
    <div class="row">
      <div class="lbl">
        <span>확인서 자동 인쇄</span>
        <small>확인서 발행 후 바로 인쇄</small>
      </div>
      <label class="toggle"><input type="checkbox" id="autoPrint" /><span class="slider"></span></label>
    </div>
  </div>
  <button class="save-btn" id="saveBtn">설정 저장</button>

  <script src="popup.js"></script>
</body>
</html>
